# Stable Diffusion 2 fine-tuning on UDIS-D converted with `prepare-udis`.
model:
  backend: stable-diffusion
  pretrained_model: /root/ApDepth/pretrained_checkpoint/stable-diffusion-2
  use_masks: true
  gradient_checkpointing: true
  enable_xformers: false
  channels_last: true

data:
  root: dataset/prepared/udis
  image_height: 512
  image_width: 1024
  num_workers: 1

loss:
  diffusion: 1.0
  reconstruction: 0.05
  seam: 0.25
  gradient: 0.05
  preserve: 0.25

train:
  output_dir: outputs/sd2-udis
  batch_size: 1
  max_steps: 20000
  learning_rate: 0.00001
  weight_decay: 0.01
  grad_accumulation: 4
  grad_clip: 1.0
  checkpoint_every: 1000
  validation_every: 500
  validation_batches: 2
  log_every: 10
  seed: 42
  device: cuda
  mixed_precision: fp16

diffusion:
  inference_steps: 50
  strength: 0.35
  prediction_type: v_prediction
