# Full ISS fine-tuning configuration based on Stable Diffusion 2 (768-v).
model:
  backend: stable-diffusion
  pretrained_model: sd2-community/stable-diffusion-2
  use_masks: true
  gradient_checkpointing: true
  enable_xformers: false
  channels_last: true

data:
  root: dataset/prepared/panoramas
  # The SD2 UNet is fully convolutional. This panorama-shaped resolution has
  # a similar pixel budget to its native 768x768 training resolution.
  image_height: 512
  image_width: 1024
  num_workers: 4

loss:
  diffusion: 1.0
  reconstruction: 0.05
  seam: 0.25
  gradient: 0.05
  preserve: 0.25

train:
  output_dir: outputs/sd2
  batch_size: 1
  max_steps: 20000
  learning_rate: 0.00001
  weight_decay: 0.01
  grad_accumulation: 4
  grad_clip: 1.0
  checkpoint_every: 1000
  validation_every: 500
  validation_batches: 2
  log_every: 10
  seed: 42
  device: cuda
  mixed_precision: fp16

diffusion:
  inference_steps: 30
  strength: 0.35
  # Stable Diffusion 2's 768-v checkpoint is trained with velocity prediction.
  # The beta schedule and training timestep count are loaded from the checkpoint.
  prediction_type: v_prediction
