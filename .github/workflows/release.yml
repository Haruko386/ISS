name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Test and create GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: write

    steps:
      - name: Check out the tagged revision
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements*.txt

      - name: Verify that the tag matches the package version
        shell: bash
        run: |
          package_version=$(python -c "import runpy; print(runpy.run_path('iss/_version.py')['__version__'])")
          tag_version="${GITHUB_REF_NAME#v}"
          if [[ "$package_version" != "$tag_version" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match ISS package version $package_version." >&2
            exit 1
          fi

      - name: Install CPU PyTorch
        run: python -m pip install --index-url https://download.pytorch.org/whl/cpu "torch>=2.2,<3"

      - name: Install ISS, tests, and packaging tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install --upgrade build twine

      - name: Run release tests
        run: python -m pytest

      - name: Build and validate distributions
        run: |
          python -m build
          python -m twine check dist/*

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: iss-python-package-${{ github.ref_name }}
          path: dist/*
          if-no-files-found: error
          retention-days: 90

      - name: Create GitHub release and attach packages
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            gh release upload "${{ github.ref_name }}" dist/* --clobber
          else
            gh release create "${{ github.ref_name }}" dist/* \
              --verify-tag \
              --generate-notes \
              --title "ISS ${{ github.ref_name }}"
          fi

  container:
    name: Publish GHCR package
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out the tagged revision
        uses: actions/checkout@v7

      - name: Normalize the container image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container
          driver-opts: |
            network=host
            image=moby/buildkit:latest

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate container metadata
        id: metadata
        shell: bash
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid semantic version: $version" >&2
            exit 1
          fi

          major="${version%%.*}"
          remainder="${version#*.}"
          minor="${remainder%%.*}"
          major_minor="${major}.${minor}"
          created="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          {
            echo "tags<<EOF"
            echo "${IMAGE_NAME}:${version}"
            echo "${IMAGE_NAME}:${major_minor}"
            echo "${IMAGE_NAME}:${major}"
            echo "${IMAGE_NAME}:latest"
            echo "EOF"

            echo "labels<<EOF"
            echo "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
            echo "org.opencontainers.image.version=${version}"
            echo "org.opencontainers.image.revision=${GITHUB_SHA}"
            echo "org.opencontainers.image.created=${created}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and publish the CPU image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
