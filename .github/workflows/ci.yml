name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out the repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements*.txt

      - name: Install CPU PyTorch
        run: python -m pip install --index-url https://download.pytorch.org/whl/cpu "torch>=2.2,<3"

      - name: Install ISS and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile Python sources
        run: python -m compileall -q iss tests main.py utils.py

      - name: Run tests
        run: python -m pytest

  package:
    name: Build Python package
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out the repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip

      - name: Install packaging tools
        run: python -m pip install --upgrade build twine

      - name: Build wheel and source distribution
        run: python -m build

      - name: Validate distributions
        run: python -m twine check dist/*

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: iss-python-package-${{ github.sha }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14
